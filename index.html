<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product list with cart</title>

</head>

<body>

  <main id="all-elements-container">

    <div id="container-for-h1-and-products-list">

      <h1 id="title">Desserts</h1>

      <div class="products-container">
        <div class="product-box">
          <img src="" alt="" class="product-img">
          <button id="add-to-cart-btn">Add to Cart</button>
          <span class="category">Macaron</span>
          <span class="product-name">Macaron Mix of Five</span>
          <span class="product-price">$8.00</span>
        </div>
      </div>
      
    </div>

    <div id="cart">
      <span class="red-text">Your Cart (<span id="quantity"></span>)</span>
      <img src="assets/images/illustration-empty-cart.svg" alt="" id="img-for-empty-cart">
      <span id="message-for-empty-cart">Your added items will appear here</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>

</html>
